version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ai_inventory_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-strongpassword}@postgres:5432/ai_inventory_os
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app

  celery-worker:
    build: .
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-strongpassword}@postgres:5432/ai_inventory_os
      REDIS_URL: redis://redis:6379
    command: celery -A app.workers.celery_app worker -l info --concurrency=2
    depends_on:
      - postgres
      - redis

  celery-beat:
    build: .
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-strongpassword}@postgres:5432/ai_inventory_os
      REDIS_URL: redis://redis:6379
    command: celery -A app.workers.celery_app beat -l info
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
